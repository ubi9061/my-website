<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Ubaid</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 50px;
  background: #020617;
}

nav h2 {
  color: #38bdf8;
}

/* Hero */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

/* Sections */
section {
  padding: 40px;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin: 10px auto;
  width: 300px;
}

/* Inputs */
input, textarea {
  width: 250px;
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #020617;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
  <h2>admin-ubaid</h2>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>Welcome to admin-ubaid Website</h1>
  <p>Upload and manage your files easily</p>
</section>

<!-- Upload Section -->
<section>
  <h2>Upload Your Files</h2>

  <input type="file" id="fileInput"><br>
  <button onclick="uploadFile()">Upload</button>

  <div id="fileList"></div>
</section>

<!-- Contact -->
<section>
  <h2>Contact Me</h2>
  <p>Email: xblasting38@gmail.com</p>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 admin-ubaid</p>
</footer>

<script>
function uploadFile() {
  const input = document.getElementById("fileInput");
  const fileList = document.getElementById("fileList");

  if (input.files.length === 0) {
    alert("Please select a file first!");
    return;
  }

  const file = input.files[0];

  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "Uploaded: " + file.name;

  fileList.appendChild(div);

  alert("File uploaded (locally)!");
}
</script>

</body>
</html>
